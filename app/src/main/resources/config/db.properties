# Configuraci\u00c3\u00b3n de conexi\u00c3\u00b3n a PostgreSQL
# Ajusta host, puerto y nombre de la base de datos segun tu entorno.
db.host=localhost
db.port=5432
db.name=peptidos_db

# Credenciales por rol de PostgreSQL. La app elige cu\u00c3\u00a1l usar segun el
# rol_bd almacenado en USUARIO_APP para el usuario que inicio sesion.
# IMPORTANTE: en un entorno real, no se deben versionar contrase\u00c3\u00b1as en texto
# plano; usar variables de entorno o un gestor de secretos.
# Rol t\u00c3\u00a9cnico usado \u00c3\u00banicamente para autenticar (lee USUARIO_APP antes de
# saber qu\u00c3\u00a9 rol de negocio le corresponde al usuario).
db.role.app_login.user=app_login
db.role.app_login.password=12345678

db.role.administrador.user=administrador
db.role.administrador.password=12345678

db.role.curador.user=curador
db.role.curador.password=12345678

db.role.consultor.user=consultor
db.role.consultor.password=12345678
